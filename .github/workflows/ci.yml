name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.14"
          cache: true

      - name: Install Rocq
        run: opam install -y rocq-prover

      - name: Verify proofs
        run: opam exec -- make test
