name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.14"

      - name: Cache Coq installation
        id: cache-coq
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: ${{ runner.os }}-ocaml-4.14-coq-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-ocaml-4.14-coq-

      - name: Install Coq
        if: steps.cache-coq.outputs.cache-hit != 'true'
        run: opam install -y coq

      - name: Verify proofs
        run: opam exec -- make test
