name: Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install browser tooling
        run: npm ci

      - name: Vendor JsCoq runtime
        run: npm run --silent vendor:jscoq

      - name: Stage licensed Pages map
        run: |
          rm -rf docs/assets
          make stage-pages-map

      - name: Verify licensed Pages map artifact
        run: |
          test -f docs/assets/manifest.json
          test -f docs/assets/maps/am_lavaarena.bsp
          grep -Fx '  "maps/am_lavaarena.bsp"' docs/assets/manifest.json
          test ! -e docs/assets/maps/q3dm1.bsp

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
