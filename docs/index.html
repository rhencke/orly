<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    viewport-fit=cover: let content fill edge-to-edge on notched phones;
    safe-area-inset-* padding below keeps UI off the notch/home bar.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>orly — Rocq in the browser</title>

  <!--
    coi-serviceworker: patches COOP/COEP headers via a service worker so
    JsCoq's SharedArrayBuffer-based workers function on GitHub Pages, which
    does not send these headers from the origin server.
    Source: https://github.com/gzuidhof/coi-serviceworker (MIT)
  -->
  <script src="coi-serviceworker.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      /* respect notch / home-bar on iOS */
      padding-bottom: env(safe-area-inset-bottom);
      padding-left:   env(safe-area-inset-left);
      padding-right:  env(safe-area-inset-right);
      /* suppress elastic over-scroll that looks odd in a game shell */
      overscroll-behavior: none;
    }

    /* ── header ─────────────────────────────────────────────── */
    #orly-header {
      flex: 0 0 auto;
      padding: 0.4rem 1rem;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid #2a2a4e;
    }
    #orly-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #a0c4ff;
    }
    #orly-header .subtitle {
      font-size: 0.75rem;
      color: #666;
    }

    /* ── status bar ──────────────────────────────────────────── */
    #status-bar {
      flex: 0 0 auto;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      text-align: center;
      border-bottom: 1px solid transparent;
    }
    #status-bar[hidden] { display: none; }
    #status-bar.loading {
      background: #111a11;
      color: #8c8;
      border-bottom-color: #1a3a1a;
    }
    #status-bar.error {
      background: #1f0f0f;
      color: #f88;
      border-bottom-color: #3a1a1a;
    }

    /* ── main split ──────────────────────────────────────────── */
    #main {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0; /* allow children to shrink */
    }

    /* ── game canvas ─────────────────────────────────────────── */
    #game-surface {
      flex: 1 1 auto;
      position: relative;
      background: #000;
      /* guarantee at least some canvas visible on very small phones */
      min-height: 25svh;
      min-width: 0;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      /* canvas intrinsic size is set by JS; CSS fills the container */
      touch-action: none;
    }
    #game-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #d4d8e2;
      font-size: 0.85rem;
      pointer-events: none;
      gap: 0.4rem;
      text-align: center;
      background:
        radial-gradient(circle at center, rgb(13 17 30 / 74%), rgb(0 0 0 / 92%));
    }
    #game-placeholder .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      max-width: min(32rem, calc(100% - 2rem));
    }
    #game-placeholder .label {
      font-size: 1.5rem;
      color: #f3f7ff;
    }
    #game-placeholder .detail {
      max-width: min(28rem, calc(100% - 2rem));
      color: #b7c4db;
      line-height: 1.45;
    }
    #copy-error-report {
      padding: 0.45rem 0.85rem;
      border: 1px solid rgb(255 180 180 / 36%);
      border-radius: 999px;
      background: rgb(39 11 11 / 72%);
      color: #ffe0e0;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      pointer-events: auto;
      cursor: pointer;
    }
    #copy-error-report:hover {
      background: rgb(65 18 18 / 80%);
      border-color: rgb(255 180 180 / 54%);
    }
    #copy-error-report:focus-visible {
      outline: 2px solid #ffd3d3;
      outline-offset: 2px;
    }
    #error-copy-fallback {
      width: min(34rem, calc(100% - 2rem));
      min-height: 11rem;
      padding: 0.85rem;
      border: 1px solid rgb(255 180 180 / 28%);
      border-radius: 0.75rem;
      background: rgb(18 6 6 / 92%);
      color: #ffe7e7;
      font: 0.78rem/1.45 ui-monospace, SFMono-Regular, SFMono-Regular, Consolas, monospace;
      resize: vertical;
      pointer-events: auto;
    }
    #error-copy-fallback::selection {
      background: rgb(160 196 255 / 36%);
    }
    #game-placeholder[data-state="error"] .label {
      color: #ffb4b4;
    }
    #game-placeholder[data-state="error"] .detail {
      color: #ffcfcf;
    }
    #game-placeholder[data-state="idle"] .label {
      color: #d7e7ff;
    }

    #game-overlay {
      --touch-pad-size: clamp(6.5rem, 24vw, 9rem);
      --look-pad-width: clamp(7.75rem, 30vw, 11rem);
      --look-pad-height: var(--touch-pad-size);
      --jump-button-size: clamp(4.5rem, 16vw, 5.75rem);
      --touch-controls-gap: clamp(0.75rem, 3vw, 1.15rem);
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding:
        max(0.75rem, env(safe-area-inset-top))
        max(0.75rem, env(safe-area-inset-right))
        max(0.75rem, env(safe-area-inset-bottom))
        max(0.75rem, env(safe-area-inset-left));
      pointer-events: none;
    }

    #game-hint {
      align-self: center;
      max-width: min(32rem, calc(100% - 2rem));
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      background: rgb(7 10 20 / 72%);
      border: 1px solid rgb(160 196 255 / 28%);
      color: #d7e7ff;
      font-size: 0.78rem;
      text-align: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #game-hint-mobile { display: none; }

    #touch-controls {
      display: none;
      width: 100%;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--touch-controls-gap);
      margin-top: auto;
    }

    .touch-cluster {
      display: flex;
      gap: var(--touch-controls-gap);
      align-items: flex-end;
    }

    .touch-cluster.right {
      flex-direction: column;
      align-items: flex-end;
    }

    .touch-pad {
      position: relative;
      width: var(--touch-pad-size);
      height: var(--touch-pad-size);
      border-radius: 50%;
      border: 1px solid rgb(160 196 255 / 24%);
      background: rgb(7 10 20 / 52%);
      box-shadow: inset 0 0 0 1px rgb(255 255 255 / 4%);
      pointer-events: auto;
      touch-action: none;
      overflow: hidden;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    [data-touch-control="look-pad"] {
      width: var(--look-pad-width);
      height: var(--look-pad-height);
      border-radius: 1.35rem;
    }

    .touch-pad::before {
      content: '';
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      border: 1px solid rgb(160 196 255 / 14%);
    }

    [data-touch-control="look-pad"]::before {
      inset: 14% 10%;
      border-radius: 1rem;
    }

    .touch-pad-label {
      position: absolute;
      left: 50%;
      bottom: 0.65rem;
      transform: translateX(-50%);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9db7df;
      pointer-events: none;
    }

    .touch-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38%;
      height: 38%;
      border-radius: 50%;
      transform: translate(0, 0);
      margin-left: -19%;
      margin-top: -19%;
      background: rgb(160 196 255 / 34%);
      border: 1px solid rgb(255 255 255 / 14%);
      box-shadow: 0 0 20px rgb(0 0 0 / 25%);
      pointer-events: none;
    }

    .touch-pad.is-active {
      background: rgb(22 38 71 / 76%);
      border-color: rgb(160 196 255 / 48%);
      box-shadow:
        inset 0 0 0 1px rgb(255 255 255 / 10%),
        0 0 28px rgb(27 76 162 / 28%);
    }

    #jump-button {
      min-width: var(--jump-button-size);
      min-height: var(--jump-button-size);
      padding: 0.8rem 1rem;
      border: 1px solid rgb(160 196 255 / 28%);
      border-radius: 999px;
      background: rgb(7 10 20 / 64%);
      color: #d7e7ff;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: auto;
      touch-action: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #jump-button:active {
      background: rgb(45 76 126 / 72%);
    }

    #jump-button.is-active {
      background: rgb(45 76 126 / 82%);
      border-color: rgb(160 196 255 / 54%);
      box-shadow: 0 0 28px rgb(27 76 162 / 32%);
    }

    /* ── drag-to-resize handle ───────────────────────────────── */
    /*
      Visual: a 4px pill centered in a 20px touch-friendly strip.
      In column layout the pill is wide (horizontal divider).
      In row layout the pill is tall (vertical divider).
    */
    #resize-handle {
      flex: 0 0 20px;
      background: transparent;
      cursor: ns-resize;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      /* prevent text selection while dragging */
      user-select: none;
      -webkit-user-select: none;
    }
    #resize-handle::before {
      content: '';
      display: block;
      background: #2a2a4e;
      border-radius: 3px;
      /* column mode: wide horizontal pill */
      width: 48px;
      height: 4px;
      transition: background 0.15s;
    }
    #resize-handle:hover::before,
    #resize-handle:active::before { background: #a0c4ff; }

    /* ── JsCoq IDE panel ─────────────────────────────────────── */
    #jscoq-panel {
      /* svh: stable viewport height — doesn't shift when mobile
         browser chrome appears/disappears during scroll */
      flex: 0 0 38svh;
      min-height: 120px;
      max-height: 65svh;
      overflow: auto;
      border-top: 2px solid #2a2a4e;
      background: #fff; /* JsCoq ships a light-theme IDE */
      position: relative;
      overscroll-behavior: contain;
    }

    /* JsCoq uses its own internal layout — let it fill the panel */
    #ide-wrapper {
      width: 100%;
      height: 100%;
    }

    /* ══════════════════════════════════════════════════════════
       RESPONSIVE: landscape phone
       Trigger: orientation landscape AND height ≤ 560px.
       On a typical phone in landscape this is true; on a tablet
       or laptop it is not (height > 560px → desktop query wins).
       ══════════════════════════════════════════════════════════ */
    @media (orientation: landscape) and (max-height: 560px) {
      #game-overlay {
        --touch-pad-size: clamp(5rem, 19vh, 6.6rem);
        --look-pad-width: clamp(7rem, 27vw, 9rem);
        --look-pad-height: clamp(4.75rem, 17vh, 6rem);
        --jump-button-size: clamp(4rem, 14vh, 5rem);
      }

      /* ultra-compact header to save vertical pixels */
      #orly-header { padding: 0.2rem 0.75rem; }
      #orly-header h1 { font-size: 0.9rem; }
      #orly-header .subtitle { display: none; }

      /* flip to horizontal split */
      #main { flex-direction: row; }

      /* resize handle becomes a vertical bar */
      #resize-handle { cursor: ew-resize; }
      #resize-handle::before { width: 4px; height: 48px; }

      /* JsCoq panel becomes right sidebar */
      #jscoq-panel {
        flex: 0 0 42vw;
        max-width: 480px;
        min-width: 180px;
        height: 100%;
        min-height: 0;
        max-height: none;
        border-top: none;
        border-left: 2px solid #2a2a4e;
      }

      #game-hint {
        align-self: flex-start;
        max-width: 18rem;
        font-size: 0.72rem;
      }
    }

    /* ══════════════════════════════════════════════════════════
       RESPONSIVE: wide screens (tablet landscape / desktop)
       ══════════════════════════════════════════════════════════ */
    @media (min-width: 1024px) {
      /* flip to horizontal split */
      #main { flex-direction: row; }

      /* resize handle becomes a vertical bar */
      #resize-handle { cursor: ew-resize; }
      #resize-handle::before { width: 4px; height: 48px; }

      /* JsCoq panel becomes right sidebar */
      #jscoq-panel {
        flex: 0 0 480px;
        height: 100%;
        min-height: 0;
        max-height: none;
        border-top: none;
        border-left: 2px solid #2a2a4e;
      }
    }

    @media (max-width: 480px) and (pointer: coarse) {
      #game-overlay {
        --touch-pad-size: clamp(5.5rem, 28vw, 7.25rem);
        --look-pad-width: min(46vw, 10.25rem);
        --look-pad-height: clamp(5.5rem, 24vw, 7rem);
        --jump-button-size: clamp(4.25rem, 18vw, 5.25rem);
        --touch-controls-gap: clamp(0.65rem, 3vw, 0.95rem);
      }

      #game-hint {
        align-self: flex-start;
        max-width: min(14rem, calc(100% - 0.5rem));
        font-size: 0.74rem;
        line-height: 1.35;
      }
    }

    @media (pointer: coarse) {
      #game-hint-desktop { display: none; }
      #game-hint-mobile { display: inline; }
      #touch-controls { display: flex; }
      #resize-handle { flex-basis: 28px; }
      #resize-handle::before {
        width: 56px;
        height: 6px;
      }
    }
  </style>
</head>
<body>
  <header id="orly-header">
    <h1>orly</h1>
    <span class="subtitle">Rocq · JsCoq · browser</span>
  </header>

  <!-- status bar: shows loading progress and surfaces errors in the UI -->
  <div id="status-bar" role="alert" aria-live="polite" hidden></div>

    <div id="main">
      <!-- ── game canvas (Quake rendering target: issues #15, #16) ── -->
      <div id="game-surface">
        <canvas id="game-canvas" aria-label="Game surface"></canvas>
        <div id="game-overlay">
          <div id="game-hint">
            <span id="game-hint-desktop">Click to look. WASD moves. Space jumps.</span>
            <span id="game-hint-mobile">Left pad moves. Right pad looks. Tap jump.</span>
          </div>
          <div id="touch-controls" hidden>
            <div class="touch-cluster left">
              <div class="touch-pad" data-touch-control="move-pad" aria-label="Movement control">
                <div class="touch-knob" data-touch-control="move-knob"></div>
                <span class="touch-pad-label">Move</span>
              </div>
            </div>
            <div class="touch-cluster right">
              <button id="jump-button" data-touch-control="jump" type="button" aria-label="Jump">
                Jump
              </button>
              <div class="touch-pad" data-touch-control="look-pad" aria-label="Look control">
                <div class="touch-knob" data-touch-control="look-knob"></div>
                <span class="touch-pad-label">Look</span>
              </div>
            </div>
          </div>
        </div>
        <div id="game-placeholder" data-state="loading" aria-live="polite">
          <div class="title-row">
            <span class="label" data-placeholder-role="title">Loading browser shell…</span>
            <button
              id="copy-error-report"
              type="button"
              data-placeholder-role="copy-button"
              hidden
            >Copy</button>
          </div>
          <span class="detail" data-placeholder-role="detail">
            Booting JsCoq and checking whether a playable BSP is available.
          </span>
          <textarea
            id="error-copy-fallback"
            data-placeholder-role="copy-fallback"
            aria-label="Selectable error report text"
            readonly
            hidden
          ></textarea>
        </div>
    </div>

    <!-- drag handle to resize the two panels -->
    <div id="resize-handle" role="separator" aria-label="Drag to resize"></div>

    <!-- ── JsCoq IDE panel ── -->
    <div id="jscoq-panel">
      <div id="ide-wrapper" class="toggled">
        <div id="code-wrapper">
          <div id="document">
            <!--
              The textarea starts empty; the JsCoq bootstrap below
              fetches docs/theories/BspCore.v (the flat, self-contained
              game-core theory) and sets .value before JsCoq.start().
            -->
            <textarea class="coq-code"></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { parseBsp } from './bsp.js';
    import { createPlayerInput } from './input.js';
    import { createRenderer, mat4Perspective } from './renderer.js';
    import { createRocqBridge } from './rocq_bridge.js';
    import { loadShadersFromAssets } from './shaders.js';

    // ── status bar helpers ───────────────────────────────────────
    const statusBar = document.getElementById('status-bar');
    const gamePlaceholder = document.getElementById('game-placeholder');
    const placeholderTitle =
      gamePlaceholder.querySelector('[data-placeholder-role="title"]');
    const placeholderDetail =
      gamePlaceholder.querySelector('[data-placeholder-role="detail"]');
    const copyErrorButton =
      gamePlaceholder.querySelector('[data-placeholder-role="copy-button"]');
    const copyFallback =
      gamePlaceholder.querySelector('[data-placeholder-role="copy-fallback"]');

    const COPY_BUTTON_LABEL = 'Copy';
    const COPY_BUTTON_COPIED_LABEL = 'Copied!';
    const DEFAULT_ROCQ_SYNC_TIMEOUT_MS = 15000;
    const MAX_ROCQ_SYNC_EVENT_HISTORY = 8;
    let copyFeedbackTimeoutId = null;

    function textOrEmpty(value) {
      return value == null ? '' : String(value);
    }

    function firstNonEmptyText(...values) {
      for (const value of values) {
        const text = textOrEmpty(value).trim();
        if (text.length > 0) return text;
      }
      return '';
    }

    function parsePositiveInt(value, fallback) {
      const parsed = Number.parseInt(textOrEmpty(value).trim(), 10);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
    }

    const ROCQ_SYNC_TIMEOUT_MS = parsePositiveInt(
      new URL(window.location.href).searchParams.get('rocq_sync_timeout_ms'),
      DEFAULT_ROCQ_SYNC_TIMEOUT_MS
    );

    function stringifyErrorValue(value) {
      if (value == null) return '';
      if (typeof value === 'string') return value;
      if (value instanceof Error) {
        return firstNonEmptyText(value.stack, value.message, value.name);
      }
      try {
        const seen = new WeakSet();
        const json = JSON.stringify(
          value,
          (_key, current) => {
            if (typeof current === 'bigint') return current.toString();
            if (current instanceof Error) {
              return {
                name: current.name,
                message: current.message,
                stack: current.stack ?? '',
              };
            }
            if (typeof current !== 'object' || current === null) return current;
            if (seen.has(current)) return '[Circular]';
            seen.add(current);
            return current;
          },
          2
        );
        if (typeof json === 'string' && json.length > 0) return json;
      } catch {}
      return textOrEmpty(value);
    }

    function errorLocation(value) {
      const url = firstNonEmptyText(value?.filename, value?.sourceURL);
      const line = Number.isInteger(value?.lineno) ? value.lineno : null;
      const column = Number.isInteger(value?.colno) ? value.colno : null;
      if (!url && line === null && column === null) return null;
      return { url, line, column };
    }

    function normalizeErrorReport(value, fallback = 'Unknown error') {
      const errorValue = value?.error ?? value?.reason ?? value;
      const message = firstNonEmptyText(
        value?.message,
        errorValue?.message,
        typeof errorValue === 'string' ? errorValue : '',
        stringifyErrorValue(errorValue),
        stringifyErrorValue(value),
        fallback
      );
      const stack = firstNonEmptyText(errorValue?.stack, value?.stack);
      const name = firstNonEmptyText(errorValue?.name, value?.name);
      const raw = firstNonEmptyText(
        stringifyErrorValue(errorValue),
        stringifyErrorValue(value)
      );
      return {
        message,
        stack,
        name,
        raw,
        location: errorLocation(value),
      };
    }

    function errorDetail(value, fallback = 'Unknown error') {
      return normalizeErrorReport(value, fallback).message;
    }

    function summarizeWorldForSyncDiagnostics(world) {
      return {
        entityCount: Array.isArray(world?.entities) ? world.entities.length : 0,
        faceCount: Array.isArray(world?.faces) ? world.faces.length : 0,
        textureCount: Array.isArray(world?.textures) ? world.textures.length : 0,
        planeCount: Array.isArray(world?.planes) ? world.planes.length : 0,
        modelCount: Array.isArray(world?.models) ? world.models.length : 0,
        brushCount: Array.isArray(world?.brushes) ? world.brushes.length : 0,
        brushSideCount: Array.isArray(world?.brushSides) ? world.brushSides.length : 0,
      };
    }

    function cloneRocqSyncEvent(value) {
      if (typeof value !== 'object' || value === null) return null;
      const payload = value.payload;
      return {
        stage: firstNonEmptyText(value.stage, 'unknown'),
        at: firstNonEmptyText(value.at),
        payload:
          typeof payload === 'object' && payload !== null
            ? JSON.parse(JSON.stringify(payload))
            : payload ?? null,
      };
    }

    function cloneRocqSyncDiagnostics(value = window.orlyRocqSyncDiagnostics) {
      if (typeof value !== 'object' || value === null) return null;
      const request =
        typeof value.request === 'object' && value.request !== null
          ? { ...value.request }
          : null;
      const lastEvent = cloneRocqSyncEvent(value.lastEvent);
      const events = Array.isArray(value.events)
        ? value.events.map(cloneRocqSyncEvent).filter(Boolean)
        : [];
      return {
        timeoutMs: parsePositiveInt(value.timeoutMs, ROCQ_SYNC_TIMEOUT_MS),
        state: firstNonEmptyText(value.state, 'idle'),
        mapLabel: firstNonEmptyText(value.mapLabel),
        startedAt: firstNonEmptyText(value.startedAt),
        finishedAt: firstNonEmptyText(value.finishedAt),
        request,
        lastEvent,
        events,
      };
    }

    function ensureRocqSyncDiagnostics() {
      if (!cloneRocqSyncDiagnostics()) {
        window.orlyRocqSyncDiagnostics = {
          timeoutMs: ROCQ_SYNC_TIMEOUT_MS,
          state: 'idle',
          mapLabel: '',
          startedAt: '',
          finishedAt: '',
          request: null,
          lastEvent: null,
          events: [],
        };
      }
      return window.orlyRocqSyncDiagnostics;
    }

    function resetRocqSyncDiagnostics() {
      window.orlyRocqSyncDiagnostics = {
        timeoutMs: ROCQ_SYNC_TIMEOUT_MS,
        state: 'idle',
        mapLabel: '',
        startedAt: '',
        finishedAt: '',
        request: null,
        lastEvent: null,
        events: [],
      };
    }

    function beginRocqSyncDiagnostics(mapLabel, world) {
      window.orlyRocqSyncDiagnostics = {
        timeoutMs: ROCQ_SYNC_TIMEOUT_MS,
        state: 'waiting',
        mapLabel: firstNonEmptyText(mapLabel),
        startedAt: new Date().toISOString(),
        finishedAt: '',
        request: summarizeWorldForSyncDiagnostics(world),
        lastEvent: null,
        events: [],
      };
    }

    function recordRocqSyncDiagnostic(event) {
      const diagnostics = ensureRocqSyncDiagnostics();
      const normalized = cloneRocqSyncEvent(event);
      if (!normalized) return;
      diagnostics.lastEvent = normalized;
      diagnostics.events = [
        ...diagnostics.events.slice(-(MAX_ROCQ_SYNC_EVENT_HISTORY - 1)),
        normalized,
      ];
    }

    function finishRocqSyncDiagnostics(state) {
      const diagnostics = ensureRocqSyncDiagnostics();
      diagnostics.state = firstNonEmptyText(state, diagnostics.state, 'idle');
      diagnostics.finishedAt = new Date().toISOString();
    }

    function formatRocqSyncDuration(durationMs) {
      if (!Number.isFinite(durationMs) || durationMs < 1000) {
        return `${Math.max(0, Math.round(durationMs || 0))} ms`;
      }
      return durationMs >= 10000
        ? `${Math.round(durationMs / 1000)}s`
        : `${(durationMs / 1000).toFixed(1)}s`;
    }

    function summarizeRocqSyncPayload(payload, limit = 140) {
      const text = firstNonEmptyText(stringifyErrorValue(payload), '(missing)');
      const compact = text.replace(/\s+/g, ' ').trim();
      if (compact.length <= limit) return compact;
      return `${compact.slice(0, Math.max(0, limit - 3))}...`;
    }

    function formatRocqSyncRequestCounts(request) {
      if (!request) return '(missing)';
      return [
        `entities=${request.entityCount ?? 0}`,
        `faces=${request.faceCount ?? 0}`,
        `textures=${request.textureCount ?? 0}`,
        `planes=${request.planeCount ?? 0}`,
        `models=${request.modelCount ?? 0}`,
        `brushes=${request.brushCount ?? 0}`,
        `brushSides=${request.brushSideCount ?? 0}`,
      ].join(', ');
    }

    function createRocqSyncTimeoutError() {
      const diagnostics = cloneRocqSyncDiagnostics();
      const startedAtMs = Date.parse(diagnostics?.startedAt ?? '');
      const durationMs = Number.isFinite(startedAtMs)
        ? Math.max(ROCQ_SYNC_TIMEOUT_MS, Date.now() - startedAtMs)
        : ROCQ_SYNC_TIMEOUT_MS;
      const lastEvent = diagnostics?.lastEvent ?? null;
      const lastEventText = lastEvent
        ? `Last bridge event: ${lastEvent.stage} (${summarizeRocqSyncPayload(lastEvent.payload, 96)}).`
        : 'No Rocq bridge payload arrived before the timeout.';
      const requestText = diagnostics?.request
        ? ` Request counts: ${formatRocqSyncRequestCounts(diagnostics.request)}.`
        : '';
      const error = new Error(
        `Timed out after ${formatRocqSyncDuration(durationMs)} waiting for Rocq to build ` +
        `the initial render snapshot. ${lastEventText}${requestText} Use Copy for full diagnostics.`
      );
      error.name = 'RocqSyncTimeoutError';
      error.diagnostics = diagnostics;
      return error;
    }

    async function withTimeout(promise, timeoutMs, createError) {
      let timeoutId = null;
      try {
        return await Promise.race([
          promise,
          new Promise((_, reject) => {
            timeoutId = window.setTimeout(() => reject(createError()), timeoutMs);
          }),
        ]);
      } finally {
        if (timeoutId !== null) window.clearTimeout(timeoutId);
      }
    }

    const DEFAULT_BUILD_INFO = Object.freeze({
      version: '1.0.0',
      gitSha: 'unknown',
      builtAt: 'unknown',
      source: 'checked-in-default',
    });

    function normalizeBuildInfo(value) {
      if (typeof value !== 'object' || value === null) return null;
      const buildInfo = {
        version: firstNonEmptyText(value.version, DEFAULT_BUILD_INFO.version),
        gitSha: firstNonEmptyText(value.gitSha, DEFAULT_BUILD_INFO.gitSha),
        builtAt: firstNonEmptyText(value.builtAt, DEFAULT_BUILD_INFO.builtAt),
        source: firstNonEmptyText(value.source, DEFAULT_BUILD_INFO.source),
      };
      const loadError = firstNonEmptyText(value.loadError);
      if (loadError.length > 0) buildInfo.loadError = loadError;
      return buildInfo;
    }

    function currentBuildInfo() {
      const buildInfo = normalizeBuildInfo(window.orlyBuildInfo);
      return buildInfo ? { ...buildInfo } : { ...DEFAULT_BUILD_INFO };
    }

    async function loadBuildInfo() {
      const buildInfoUrl = new URL('./build-info.json', window.location.href);
      try {
        const resp = await fetch(buildInfoUrl);
        if (!resp.ok) throw new Error(`build metadata fetch failed: HTTP ${resp.status}`);
        const buildInfo = normalizeBuildInfo(await resp.json());
        if (!buildInfo) throw new Error('build metadata payload is not an object');
        return buildInfo;
      } catch (err) {
        return {
          ...DEFAULT_BUILD_INFO,
          source: 'fallback',
          loadError: errorDetail(err),
        };
      }
    }

    function clearCopyFeedbackTimer() {
      if (copyFeedbackTimeoutId !== null) {
        window.clearTimeout(copyFeedbackTimeoutId);
        copyFeedbackTimeoutId = null;
      }
    }

    function resetErrorCopyUi() {
      clearCopyFeedbackTimer();
      copyErrorButton.textContent = COPY_BUTTON_LABEL;
      copyFallback.hidden = true;
      copyFallback.value = '';
    }

    function syncErrorCopyUi() {
      const hasErrorReport =
        gamePlaceholder.dataset.state === 'error' && window.orlyErrorReport !== null;
      copyErrorButton.hidden = !hasErrorReport;
      if (!hasErrorReport) resetErrorCopyUi();
    }

    function formatErrorLocation(location) {
      if (!location) return 'unknown';
      const parts = [];
      const url = firstNonEmptyText(location.url);
      if (url.length > 0) parts.push(url);
      if (Number.isInteger(location.line)) parts.push(`line ${location.line}`);
      if (Number.isInteger(location.column)) parts.push(`column ${location.column}`);
      return parts.length > 0 ? parts.join(', ') : 'unknown';
    }

    function formatBuildMetadata(build) {
      const buildInfo = normalizeBuildInfo(build) ?? DEFAULT_BUILD_INFO;
      const lines = [
        `Build version: ${buildInfo.version}`,
        `Build git SHA: ${buildInfo.gitSha}`,
        `Build timestamp: ${buildInfo.builtAt}`,
        `Build source: ${buildInfo.source}`,
      ];
      const loadError = firstNonEmptyText(build?.loadError);
      if (loadError.length > 0) {
        lines.push(`Build metadata load error: ${loadError}`);
      }
      return lines;
    }

    function formatRocqSyncDiagnosticsForClipboard(diagnostics) {
      const syncDiagnostics = cloneRocqSyncDiagnostics(diagnostics);
      if (!syncDiagnostics) return [];
      const lines = [
        '',
        'Rocq sync diagnostics:',
        `Timeout: ${syncDiagnostics.timeoutMs} ms`,
        `State: ${syncDiagnostics.state}`,
        `Map: ${firstNonEmptyText(syncDiagnostics.mapLabel, '(unknown)')}`,
        `Started at: ${firstNonEmptyText(syncDiagnostics.startedAt, '(unknown)')}`,
      ];
      if (syncDiagnostics.finishedAt.length > 0) {
        lines.push(`Finished at: ${syncDiagnostics.finishedAt}`);
      }
      if (syncDiagnostics.request) {
        lines.push(`Request counts: ${formatRocqSyncRequestCounts(syncDiagnostics.request)}`);
      }
      if (syncDiagnostics.lastEvent) {
        lines.push(`Last bridge event: ${syncDiagnostics.lastEvent.stage}`);
        lines.push(`Last bridge payload: ${summarizeRocqSyncPayload(syncDiagnostics.lastEvent.payload, 240)}`);
      } else {
        lines.push('Last bridge event: (none)');
      }
      if (syncDiagnostics.events.length > 0) {
        lines.push('', 'Recent bridge events:');
        for (const event of syncDiagnostics.events) {
          lines.push(
            `- ${firstNonEmptyText(event.at, '(unknown time)')} ${event.stage}: ` +
            `${summarizeRocqSyncPayload(event.payload, 180)}`
          );
        }
      }
      return lines;
    }

    function formatErrorReportForClipboard(report = window.orlyErrorReport) {
      if (!report) return '';
      const raw = firstNonEmptyText(report.raw);
      const stack = firstNonEmptyText(report.stack);
      const lines = [
        '```text',
        `Title: ${firstNonEmptyText(report.title, 'Unknown title')}`,
        `Status: ${firstNonEmptyText(report.status, 'Unknown status')}`,
        `Message: ${firstNonEmptyText(report.message, 'Unknown error')}`,
        `Source: ${firstNonEmptyText(report.source, 'unknown')}`,
        `Captured at: ${firstNonEmptyText(report.capturedAt, 'unknown')}`,
        `Page URL: ${window.location.href}`,
        `User agent: ${navigator.userAgent}`,
        ...formatBuildMetadata(report.build),
        `Location: ${formatErrorLocation(report.location)}`,
        ...formatRocqSyncDiagnosticsForClipboard(report.diagnostics),
        '',
        'Stack trace:',
        stack.length > 0 ? stack : '(missing)',
      ];
      if (raw.length > 0 && raw !== stack) {
        lines.push('', 'Raw error:', raw);
      }
      lines.push('```');
      return lines.join('\n');
    }

    function showCopyFallback(text) {
      copyFallback.value = text;
      copyFallback.hidden = false;
      copyFallback.focus();
      copyFallback.select();
      copyFallback.setSelectionRange(0, text.length);
    }

    function showCopiedFeedback() {
      clearCopyFeedbackTimer();
      copyErrorButton.textContent = COPY_BUTTON_COPIED_LABEL;
      copyFeedbackTimeoutId = window.setTimeout(() => {
        copyErrorButton.textContent = COPY_BUTTON_LABEL;
        copyFeedbackTimeoutId = null;
      }, 1000);
    }

    async function copyCurrentErrorReport() {
      const text = formatErrorReportForClipboard();
      if (text.length === 0) return;
      if (typeof navigator.clipboard?.writeText === 'function') {
        try {
          await navigator.clipboard.writeText(text);
          copyFallback.hidden = true;
          copyFallback.value = '';
          showCopiedFeedback();
          return;
        } catch (err) {
          console.warn('Clipboard write failed, falling back to selectable text:', err);
        }
      }
      copyErrorButton.textContent = COPY_BUTTON_LABEL;
      showCopyFallback(text);
    }

    function clearErrorReport() {
      window.orlyErrorReport = null;
      syncErrorCopyUi();
    }

    function captureErrorReport({
      source,
      title,
      status,
      error,
      fallback = 'Unknown error',
      diagnostics = null,
    }) {
      const rocqSyncDiagnostics =
        cloneRocqSyncDiagnostics(diagnostics) ??
        cloneRocqSyncDiagnostics(error?.diagnostics) ??
        null;
      const report = {
        source: textOrEmpty(source),
        title: textOrEmpty(title),
        status: textOrEmpty(status),
        capturedAt: new Date().toISOString(),
        build: currentBuildInfo(),
        ...normalizeErrorReport(error, fallback),
      };
      if (rocqSyncDiagnostics) {
        report.diagnostics = rocqSyncDiagnostics;
      }
      window.orlyErrorReport = report;
      if (report.status.length > 0) {
        showStatus(report.status, 'error');
      }
      showPlaceholder(report.title, report.message, 'error');
      resetErrorCopyUi();
      syncErrorCopyUi();
      return report;
    }

    function showPlaceholder(title, detail = '', state = 'loading') {
      const safeTitle = textOrEmpty(title);
      const safeDetail = textOrEmpty(detail);
      gamePlaceholder.hidden = false;
      gamePlaceholder.dataset.state = state;
      placeholderTitle.textContent = safeTitle;
      placeholderDetail.textContent = safeDetail;
      placeholderDetail.hidden = safeDetail.length === 0;
      if (state !== 'error') clearErrorReport();
      else syncErrorCopyUi();
    }

    function hidePlaceholder() {
      gamePlaceholder.hidden = true;
      gamePlaceholder.dataset.state = 'ready';
      clearErrorReport();
    }

    function showStatus(msg, type = 'loading') {
      statusBar.hidden = false;
      statusBar.className = type;
      statusBar.textContent = msg;
    }

    function clearStatus() {
      statusBar.hidden = true;
      statusBar.className = '';
      statusBar.textContent = '';
    }

    window.orlyBuildInfo = await loadBuildInfo();
    resetRocqSyncDiagnostics();
    clearErrorReport();
    copyErrorButton.addEventListener('click', () => {
      void copyCurrentErrorReport();
    });

    const GAME_TICK_MS = 16;
    const MAX_FRAME_DT_MS = 100;
    const MAX_SIMULATION_STEPS = 6;

    // ── global error surface ─────────────────────────────────────
    // Catch anything that slips through — script errors, failed fetches,
    // JsCoq internal errors that bubble up as uncaught exceptions.
    window.addEventListener('error', (e) => {
      const msg = errorDetail(e);
      captureErrorReport({
        source: 'window-error',
        title: 'Browser startup failed',
        status: `Error: ${msg}`,
        error: e,
      });
    });
    window.addEventListener('unhandledrejection', (e) => {
      const msg = errorDetail(e.reason);
      captureErrorReport({
        source: 'unhandled-rejection',
        title: 'Browser startup failed',
        status: `Error: ${msg}`,
        error: e,
      });
    });

    // ── asset loader ─────────────────────────────────────────────
    //
    // Loads game assets produced by `make assets`.  Fetches
    // assets/manifest.json first to discover what files are available,
    // then retrieves each as an ArrayBuffer using parallel fetches.
    //
    // Returns a Map<string, ArrayBuffer> keyed by relative asset path
    // (e.g. "maps/am_lavaarena.bsp").  The renderer (issue #15) reads from
    // window.orlyAssets at draw time.
    //
    // Graceful degradation: a missing manifest (HTTP 404) just means the
    // staged licensed map or local q3dm1 assets are not present yet —
    // normal in fresh checkouts and local previews.  The function returns
    // an empty Map without surfacing a user-visible error.
    async function loadAssets() {
      let manifest;
      try {
        const resp = await fetch('assets/manifest.json');
        if (resp.status === 404) return new Map();
        if (!resp.ok) throw new Error(`manifest fetch failed: HTTP ${resp.status}`);
        manifest = await resp.json();
      } catch (err) {
        // Network-level failure (offline, file:// origin, CORS) — not fatal.
        if (err instanceof TypeError) return new Map();
        throw err;
      }

      if (!Array.isArray(manifest) || manifest.length === 0) return new Map();

      const total = manifest.length;
      const assets = new Map();
      let loaded = 0;

      showStatus(`Loading assets: 0 / ${total}`);

      // Fetch all files in parallel; update the counter as each completes.
      await Promise.all(manifest.map(async (path) => {
        const resp = await fetch(`assets/${path}`);
        if (!resp.ok) throw new Error(`${path}: HTTP ${resp.status}`);
        assets.set(path, await resp.arrayBuffer());
        showStatus(`Loading assets: ${++loaded} / ${total}`);
      }));

      return assets;
    }

    // ── JsCoq bootstrap ─────────────────────────────────────────
    // Serve the JsCoq runtime from docs/vendor/jscoq so every startup
    // fetch (module, worker, images, quick-help, packages) stays same-origin.
    const JSCOQ_ROOT = new URL('./vendor/jscoq/', window.location.href);
    const PREFERRED_BSP_PATHS = [
      'maps/am_lavaarena.bsp',
      'maps/q3dm1.bsp',
    ];

    function describeMapPath(path) {
      return path.replace(/^maps\//, '').replace(/\.bsp$/i, '');
    }

    function pickDemoMapPath(assets) {
      return PREFERRED_BSP_PATHS.find(path => assets.has(path)) ?? null;
    }

    // ── BSP game theory loader ───────────────────────────────────
    //
    // Fetches docs/theories/BspCore.v — a flat, self-contained Rocq
    // source file generated by `make browser-theories` that concatenates
    // BspBinary, BspEntity, and GameState in dependency order with
    // cross-file "From Bsp Require Import" lines stripped so JsCoq can
    // compile the whole thing against its bundled stdlib.
    //
    // Why flat? JsCoq 0.17.1 runs Rocq 8.17.1; the system Rocq (9.x)
    // produces .vo files that are incompatible with JsCoq's binary
    // format, so we can't serve a pre-compiled package.  JsCoq can,
    // however, compile source on the fly — we just need a single file
    // with no external library references.
    //
    // Fallback chain on failure:
    //   1. theories/BspCore.v  (generated flat bundle)
    //   2. theories/BspBinary.v  (standalone stdlib-only theory)
    //   3. null  (leave editor empty; user sees JsCoq with blank doc)
    async function loadBspTheory() {
      for (const path of ['theories/BspCore.v', 'theories/BspBinary.v']) {
        try {
          const resp = await fetch(path);
          if (resp.ok) {
            console.log(`orly: loaded JsCoq theory from ${path}`);
            return await resp.text();
          }
        } catch (_) {}
      }
      console.warn('orly: could not load any BSP theory — JsCoq editor will be empty');
      return null;
    }

    let jscoqOk = false;
    let rocqBridge = null;
    let rocqBridgeWarmup = null;
    showPlaceholder(
      'Loading JsCoq and game theories…',
      'Fetching the Rocq runtime and the browser-side game theory bundle.'
    );
    showStatus('Loading JsCoq and game theories…');
    try {
      // Fetch the JsCoq module and the game theory file in parallel —
      // neither depends on the other, so there's no reason to wait.
      const [{ JsCoq }, theoryText] = await Promise.all([
        import(new URL('jscoq.js', JSCOQ_ROOT).href),
        loadBspTheory(),
      ]);

      // Populate the textarea BEFORE JsCoq.start() so the Rocq kernel
      // sees the real game theory text when it initialises the editor.
      if (theoryText) {
        const ta = document.querySelector('.coq-code');
        if (ta) ta.value = theoryText;
      }

      showStatus('Starting Rocq kernel…');
      showPlaceholder(
        'Starting Rocq kernel…',
        'Compiling the game-core theories inside the browser.'
      );
      const coq = await JsCoq.start(
        JSCOQ_ROOT.href,
        ['.coq-code'],
        {
          prelude:       true,
          implicit_libs: true,
          editor:        { mode: { 'company-coq': true } },
          init_pkgs:     ['init'],
          all_pkgs:      ['coq'],
        }
      );
      rocqBridge = createRocqBridge(coq, {
        onDiagnostic: recordRocqSyncDiagnostic,
      });
      // Start compiling the bridge helpers immediately so theory loading
      // overlaps asset fetch instead of blocking the first render sync.
      rocqBridgeWarmup =
        typeof rocqBridge.prepare === 'function'
          ? rocqBridge.prepare()
          : null;
      if (rocqBridgeWarmup) {
        rocqBridgeWarmup.catch(err => {
          console.error('Rocq bridge warmup failed:', err);
        });
      }
      jscoqOk = true;
    } catch (err) {
      const msg = errorDetail(err);
      captureErrorReport({
        source: 'jscoq-bootstrap',
        title: 'JsCoq startup failed',
        status: `Failed to load JsCoq: ${msg}`,
        error: err,
      });
      console.error('JsCoq bootstrap failed:', err);
    }

    // ── asset loading ────────────────────────────────────────────
    // Runs after JsCoq.start() is called; the Rocq kernel boots
    // asynchronously in the background while we fetch game data.
    // Only updates the status bar when JsCoq is healthy — a JsCoq
    // failure leaves its error message visible rather than overwriting
    // it with asset progress.
    try {
      window.orlyAssets = await loadAssets();
      const selectedMapPath = pickDemoMapPath(window.orlyAssets);
      window.orlySelectedMapPath = selectedMapPath;
      if (window.orlyAssets.size > 0)
        console.log(`orly: loaded ${window.orlyAssets.size} game assets`);
      if (jscoqOk && !selectedMapPath) {
        showPlaceholder(
          'No playable BSP found',
          'Run make stage-pages-map for the licensed OpenArena map, or make assets DEMO=/path/to/pak0.pk3 for q3dm1.',
          'idle'
        );
      }
      if (jscoqOk) clearStatus();
    } catch (err) {
      console.error('Asset loading failed:', err);
      window.orlyAssets = new Map();
      const msg = errorDetail(err);
      captureErrorReport({
        source: 'asset-loading',
        title: 'Asset loading failed',
        status: jscoqOk ? `Failed to load assets: ${msg}` : '',
        error: err,
      });
    }

    // ── game canvas sizing ───────────────────────────────────────
    // Keep the canvas pixel dimensions in sync with its CSS layout size
    // so the renderer gets a correctly sized drawing surface.
    const canvas = document.getElementById('game-canvas');
    const touchOverlay = document.getElementById('touch-controls');
    const canvasHost = canvas.parentElement;

    function syncCanvasSize() {
      if (!canvasHost) return;
      const { width, height } = canvasHost.getBoundingClientRect();
      canvas.width = Math.max(1, Math.round(width));
      canvas.height = Math.max(1, Math.round(height));
    }

    function nextAnimationFrame() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }

    syncCanvasSize();
    const ro = new ResizeObserver(() => {
      syncCanvasSize();
    });
    if (canvasHost) {
      ro.observe(canvasHost);
    }

    // ── BSP parse + render pipeline ──────────────────────────────
    // If the BSP file was loaded, parse it and start the renderer.
    // The placeholder is hidden once WebGL is up and drawing.
    const selectedMapPath = window.orlySelectedMapPath;
    const selectedMapLabel = selectedMapPath ? describeMapPath(selectedMapPath) : 'demo map';
    const bspBuffer = selectedMapPath ? window.orlyAssets.get(selectedMapPath) : null;
    if (bspBuffer) {
      try {
        showStatus('Parsing BSP…');
        showPlaceholder(
          `Parsing ${selectedMapLabel} BSP…`,
          'Decoding level geometry and lightmaps.'
        );
        const bsp = parseBsp(bspBuffer);
        console.log(`orly: parsed BSP — ${bsp.faces.length} faces, ` +
                    `${bsp.vertices.length} vertices, ` +
                    `${bsp.lightmaps.length} lightmaps`);

        if (!rocqBridge) {
          throw new Error('Rocq bridge is unavailable');
        }
        if (rocqBridgeWarmup) {
          await rocqBridgeWarmup;
        }

        showStatus('Syncing Rocq render state…');
        showPlaceholder(
          'Syncing Rocq render state…',
          'Building the initial render snapshot from the verified game core.'
        );
        const rocqSyncWorld = {
          entities: bsp.entities,
          faces: bsp.faces,
          textures: bsp.textures,
          planes: bsp.planes,
          models: bsp.models,
          brushes: bsp.brushes,
          brushSides: bsp.brushSides,
        };
        beginRocqSyncDiagnostics(selectedMapLabel, rocqSyncWorld);
        let initialSnapshot;
        try {
          initialSnapshot = await withTimeout(
            rocqBridge.load_world(rocqSyncWorld),
            ROCQ_SYNC_TIMEOUT_MS,
            createRocqSyncTimeoutError
          );
          finishRocqSyncDiagnostics('ready');
        } catch (err) {
          finishRocqSyncDiagnostics(err?.name === 'RocqSyncTimeoutError' ? 'timed-out' : 'failed');
          throw err;
        }

        showStatus('Loading shaders…');
        showPlaceholder(
          'Loading shaders…',
          `Mapping ${selectedMapLabel} materials to browser textures.`
        );
        const shaderDefs = await loadShadersFromAssets(window.orlyAssets);
        console.log(`orly: loaded ${shaderDefs.size} shader definitions`);

        showStatus('Initializing renderer…');
        showPlaceholder(
          'Initializing renderer…',
          `Preparing the first WebGL frame for ${selectedMapLabel}.`
        );
        const renderer = createRenderer(canvas, bsp, {
          shaderDefs,
          assets: window.orlyAssets,
          assetBasePath: 'assets/',
          visibleFaces: initialSnapshot.visibleFaces,
        });

        const projMatrix = new Float32Array(16);
        const playerInput = createPlayerInput(canvas, touchOverlay);
        let lastFrameTime = null;
        let accumulatedDtMs = 0;
        let latestSnapshot = initialSnapshot;
        let latestButtons = {
          forward: false,
          back: false,
          left: false,
          right: false,
          jump: false,
        };
        let pendingYawDelta = 0;
        let pendingPitchDelta = 0;
        let pendingJump = false;

        function renderSnapshot(snapshot) {
          syncCanvasSize();
          const aspect = canvas.width / canvas.height || 1;
          mat4Perspective(projMatrix, Math.PI / 2, aspect, 1.0, 4096.0);
          renderer.render(snapshot.viewMatrix, projMatrix);
        }

        await nextAnimationFrame();
        renderSnapshot(latestSnapshot);

        // Hide the placeholder only after a real Rocq-seeded frame has drawn.
        hidePlaceholder();

        async function frame(now) {
          const frameDtMs = lastFrameTime === null
            ? 0
            : Math.min(MAX_FRAME_DT_MS, Math.max(0, now - lastFrameTime));
          lastFrameTime = now;

          const sampledInput = playerInput.sample(frameDtMs);
          latestButtons = {
            forward: sampledInput.forward,
            back: sampledInput.back,
            left: sampledInput.left,
            right: sampledInput.right,
            jump: sampledInput.jump,
          };
          pendingYawDelta += sampledInput.yawDelta;
          pendingPitchDelta += sampledInput.pitchDelta;
          pendingJump ||= sampledInput.jump;
          accumulatedDtMs += frameDtMs;

          let steps = 0;
          while (accumulatedDtMs >= GAME_TICK_MS && steps < MAX_SIMULATION_STEPS) {
            latestSnapshot = await rocqBridge.step({
              ...latestButtons,
              jump: pendingJump || latestButtons.jump,
              yawDelta: pendingYawDelta,
              pitchDelta: pendingPitchDelta,
              dtMs: GAME_TICK_MS,
            });
            pendingYawDelta = 0;
            pendingPitchDelta = 0;
            pendingJump = false;
            accumulatedDtMs -= GAME_TICK_MS;
            steps++;
          }

          if (accumulatedDtMs >= GAME_TICK_MS) {
            console.warn(
              `orly: dropping ${(accumulatedDtMs / GAME_TICK_MS).toFixed(1)} queued ticks after frame hitch`
            );
            accumulatedDtMs %= GAME_TICK_MS;
          }

          renderSnapshot(latestSnapshot);
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

        clearStatus();
        console.log('orly: render pipeline active — snapshot seeded from Rocq state');
      } catch (err) {
        console.error('BSP render init failed:', err);
        const msg = errorDetail(err);
        const isRocqSyncTimeout = err?.name === 'RocqSyncTimeoutError';
        captureErrorReport({
          source: isRocqSyncTimeout ? 'rocq-sync-timeout' : 'render-startup',
          title: isRocqSyncTimeout ? 'Rocq render sync timed out' : 'Render startup failed',
          status: isRocqSyncTimeout ? `Rocq sync timeout: ${msg}` : `Render error: ${msg}`,
          error: err,
          diagnostics: cloneRocqSyncDiagnostics(),
        });
      }
    }
    // ── direction-aware drag-to-resize ───────────────────────────
    //
    // CSS switches #main between column (portrait/narrow) and row
    // (landscape phone / desktop) via media queries.  The JS resize
    // handler must match: drag vertically in column mode, horizontally
    // in row mode.  On layout-mode change we also reset any inline flex
    // override so the CSS default sizes take over cleanly.
    //
    // Media queries that switch to row layout (must match CSS @media):
    const LANDSCAPE_PHONE = '(orientation: landscape) and (max-height: 560px)';
    const WIDE_SCREEN      = '(min-width: 1024px)';
    const rowModeQuery = window.matchMedia(`${LANDSCAPE_PHONE}, ${WIDE_SCREEN}`);

    const isRowMode = () => rowModeQuery.matches;

    const handle     = document.getElementById('resize-handle');
    const jscoqPanel = document.getElementById('jscoq-panel');
    let dragging = false, startPos = 0, startSize = 0;

    const onStart = (x, y) => {
      dragging  = true;
      startPos  = isRowMode() ? x : y;
      startSize = isRowMode() ? jscoqPanel.offsetWidth : jscoqPanel.offsetHeight;
    };

    const onMove = (x, y) => {
      if (!dragging) return;
      if (isRowMode()) {
        // dragging left (negative delta) increases the right-side panel
        const delta = startPos - x;
        const max   = window.innerWidth * 0.8;
        const next  = Math.max(180, Math.min(max, startSize + delta));
        jscoqPanel.style.flex = `0 0 ${next}px`;
      } else {
        // dragging up (negative delta) increases the bottom panel
        const delta = startPos - y;
        const max   = window.innerHeight * 0.8;
        const next  = Math.max(120, Math.min(max, startSize + delta));
        jscoqPanel.style.flex = `0 0 ${next}px`;
      }
    };

    const onEnd = () => { dragging = false; };

    // Reset inline size when the layout mode changes (e.g. phone rotated)
    // so CSS default proportions take over for the new orientation.
    rowModeQuery.addEventListener('change', () => {
      jscoqPanel.style.flex = '';
    });

    // mouse
    handle.addEventListener('mousedown',  (e) => onStart(e.clientX, e.clientY));
    document.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup',   onEnd);

    // touch (passive where possible to avoid blocking scroll on the rest of the page)
    handle.addEventListener('touchstart', (e) => {
      onStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    document.addEventListener('touchmove', (e) => {
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    document.addEventListener('touchend', onEnd);
  </script>
</body>
</html>
